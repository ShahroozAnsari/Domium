name: Publish NuGet Packages

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Package version to publish, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: read

env:
  DOTNET_VERSION: "10.0.x"
  CONFIGURATION: Release
  PACKAGE_OUTPUT: artifacts/packages
  NUGET_SOURCE: https://api.nuget.org/v3/index.json

jobs:
  publish:
    name: Build, Pack, Publish
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Resolve package version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF_NAME#v}"
          fi

          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+([-.][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid package version: $VERSION" >&2
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore Domium.slnx

      - name: Build
        run: >
          dotnet build Domium.slnx
          --configuration ${{ env.CONFIGURATION }}
          --no-restore
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }}

      - name: Test
        run: >
          dotnet test Domium.slnx
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --logger "trx;LogFileName=test-results.trx"
          --results-directory artifacts/test-results

      - name: Pack
        run: >
          dotnet pack Domium.slnx
          --configuration ${{ env.CONFIGURATION }}
          --no-build
          --output ${{ env.PACKAGE_OUTPUT }}
          /p:PackageVersion=${{ steps.version.outputs.version }}
          /p:RepositoryUrl=${{ github.server_url }}/${{ github.repository }}

      - name: Publish packages
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -z "$NUGET_API_KEY" ]; then
            echo "NUGET_API_KEY repository secret is not configured." >&2
            exit 1
          fi

          shopt -s nullglob

          packages=("${{ env.PACKAGE_OUTPUT }}"/*.nupkg)
          symbols=("${{ env.PACKAGE_OUTPUT }}"/*.snupkg)

          if [ ${#packages[@]} -eq 0 ]; then
            echo "No NuGet packages were produced." >&2
            exit 1
          fi

          for package in "${packages[@]}"; do
            dotnet nuget push "$package" \
              --api-key "$NUGET_API_KEY" \
              --source "${{ env.NUGET_SOURCE }}" \
              --skip-duplicate
          done

          for symbols_package in "${symbols[@]}"; do
            dotnet nuget push "$symbols_package" \
              --api-key "$NUGET_API_KEY" \
              --source "${{ env.NUGET_SOURCE }}" \
              --skip-duplicate
          done

      - name: Upload packages
        uses: actions/upload-artifact@v4
        with:
          name: nuget-packages-${{ steps.version.outputs.version }}
          path: ${{ env.PACKAGE_OUTPUT }}
          if-no-files-found: error

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ steps.version.outputs.version }}
          path: artifacts/test-results
          if-no-files-found: ignore
